<!DOCTYPE html>

<head>
    <title>DIV y SPAN</title>
    <link rel="stylesheet" href="misEstilos.css">
</head>
<body>
    <main>
        <div>
            <h2>Operaciones matematicas</h2>
            <p>Las matemáticas son importantes</p>
            <p>Estas son algunas de las mas basicas:</p>
            <div class="calculo">
                <p>5 + 8 = <span class="resultado">13</span></p>
                 <p>10 - 6 = <span class="resultado">4</span></p>
                  <p>3 x 10 = <span class="resultado">40</span></p>
        </div>
        <p>Existen muchos tipos distintas.</p>
        <p>Pronto veremos otras mas complejas.</p>
        </div>
    </main>
</body>
</html>
